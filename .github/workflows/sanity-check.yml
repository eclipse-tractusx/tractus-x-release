name: Sanity Check

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Release version (e.g. 24.05)'
        required: true
        type: string

jobs:
  run-sanity-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.3.0
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r tools/sanity-check/requirements.txt
      - name: Run sanity-check
        run: |
          source venv/bin/activate
          python tools/sanity-check/check.py CHANGELOG.md ${{ github.event.inputs.release }}
